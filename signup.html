<!DOCTYPE html>
<html>
<head>
    <title>Sign Up | IST LMS</title>
    <link rel="stylesheet" href="stylesheet.css">
</head>

<body>

<div class="lms-box">

    <!-- Logo -->
   <div class="lms-logo">&#128216; IST <span>LMS</span></div>

    <!-- Heading -->
    <h1>Sign Up</h1>
    <h2>Create your account</h2>

    <!-- Form -->
    <form action="login.html">

        <input type="text" class="input-box" placeholder="Full Name" required>
        <input type="email" class="input-box" placeholder="Email" required>
        <input type="password" class="input-box" placeholder="Password" required>

        <div class="lms-buttons">
            <button type="submit" class="btn-box">Sign Up</button>
            <a href="index.html" class="btn-box">Go Back</a>
        </div>

    </form>

</div>

</body>
</html>
