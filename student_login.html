<!DOCTYPE html>
<html>
<head>
    <title>Student Login | IST LMS</title>
    <link rel="stylesheet" href="stylesheet.css">
</head>

<body>

<div class="lms-box">

    <div class="lms-logo">&#128216; IST <span>LMS</span></div>

    <h1>Student Login</h1>

    <form id="loginForm">
        <input type="text" id="student_id" class="input-box" placeholder="Student ID (e.g. IST101)" required>
        <input type="password" id="password" class="input-box" placeholder="Password" required>

        <p id="msg" style="color:red; margin:6px 0; font-size:14px;"></p>

        <div class="lms-buttons">
            <button type="submit" class="btn-box">Login</button>
            <a href="login.html" class="btn-box">Back</a>
        </div>
    </form>

</div>

<script>
document.getElementById('loginForm').addEventListener('submit', async function(e) {
    e.preventDefault();
    const msg = document.getElementById('msg');
    msg.textContent = 'Logging in...';
    msg.style.color = '#00eaff';

    const res = await fetch('backend/student_auth.php', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
            action: 'login',
            student_id: document.getElementById('student_id').value,
            password: document.getElementById('password').value
        })
    });

    const data = await res.json();

    if (data.success) {
        // Save student info to sessionStorage
        sessionStorage.setItem('studentId', data.student_id);
        sessionStorage.setItem('studentName', data.name);
        sessionStorage.setItem('studentDept', data.department);
        window.location.href = 'student-dashboard.html';
    } else {
        msg.style.color = 'red';
        msg.textContent = data.message;
    }
});
</script>

</body>
</html>
